<!DOCTYPE html>
<html lang="en">
<head>
  <script src="coi-serviceworker.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complex Plotter</title>
<style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      width: 100vw !important;
      height: 100vh !important;
      display: block;
      outline: none;
      touch-action: none;
      image-rendering: pixelated;
    }
    #loading-overlay {
      position: absolute;
      width:100%;
      height: 100%;
      inset: 0;
      background-color: #1e1e1e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #09d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <h2>Loading...</h2>
  </div>
  
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <script type="text/javascript">
    const canvas = document.getElementById('canvas');
    canvas.addEventListener("webglcontextlost", (e) => {
      alert('Error with WebGL. Please reload the page');
      e.preventDefault();
    }, false);
    
    var Module = {
      canvas: canvas,
      print: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
      onRuntimeInitialized: function() {
        document.getElementById('loading-overlay').style.display = 'none';
        canvas.focus();
      }
  };
  </script>
  <textarea id="clipping" style="position:absolute; width:0; height:0; border:0; opacity:0; pointer-events:none;" aria-hidden="true"></textarea>

  <script async type="text/javascript" src="complex-plotter.js"></script>
</body>
</html>
